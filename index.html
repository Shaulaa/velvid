<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvid · Video Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="floater f1"></div><div class="floater f2"></div>
<div class="floater f3"></div><div class="floater f4"></div>

<div class="page">
  <div class="header">
    <div class="logo-dot"></div>
    <h1 class="brand">Vel<em>vid</em></h1>
    <p class="tagline">Download video dengan mudah &amp; cantik</p>
  </div>

  <div class="platform-tabs">
    <button class="tab tab-fb active" onclick="selectTab(this,'facebook')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </button>
    <button class="tab tab-ig" onclick="selectTab(this,'instagram')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      Instagram
    </button>
    <button class="tab tab-tt" onclick="selectTab(this,'tiktok')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
      TikTok
    </button>
  </div>

  <div class="card">
    <label class="input-label">Tempel URL Video</label>
    <div class="input-wrap">
      <input class="url-input" id="urlInput" type="text" placeholder="https://www.facebook.com/watch?v=..."/>
      <button class="paste-btn" onclick="pasteUrl()">Tempel</button>
    </div>

    <!-- Info panel setelah fetch -->
    <div class="info-panel" id="infoPanel">
      <img class="info-thumb" id="infoThumb" src="" alt="thumbnail" onerror="this.style.display='none'"/>
      <div class="info-title" id="infoTitle"></div>
      <div class="info-meta" id="infoMeta"></div>
    </div>

    <span class="section-title">Pilih Resolusi</span>
    <div class="res-grid">
      <button class="res-chip" onclick="selectRes(this,'2160p')">4K<span class="badge">2160p</span></button>
      <button class="res-chip" onclick="selectRes(this,'1080p')">Full HD<span class="badge">1080p</span></button>
      <button class="res-chip active" onclick="selectRes(this,'720p')">HD<span class="badge">720p</span></button>
      <button class="res-chip" onclick="selectRes(this,'480p')">SD<span class="badge">480p</span></button>
      <button class="res-chip" onclick="selectRes(this,'360p')">Low<span class="badge">360p</span></button>
      <button class="res-chip" onclick="selectRes(this,'240p')">Mini<span class="badge">240p</span></button>
      <button class="res-chip" onclick="selectRes(this,'audio')">🎵<span class="badge">Audio</span></button>
      <button class="res-chip" onclick="selectRes(this,'best')">✨<span class="badge">Terbaik</span></button>
    </div>

    <span class="section-title">Format</span>
    <div class="format-row">
      <button class="fmt-btn active" onclick="selectFmt(this)">MP4</button>
      <button class="fmt-btn" onclick="selectFmt(this)">WEBM</button>
      <button class="fmt-btn" onclick="selectFmt(this)">MP3</button>
      <button class="fmt-btn" onclick="selectFmt(this)">M4A</button>
    </div>

    <button class="dl-btn" id="dlBtn" onclick="handleDownload()">
      <div class="btn-inner">
        <div class="spin-ring"></div>
        <span id="btnText">✦ Unduh Video</span>
      </div>
    </button>

    <!-- Progress bar -->
    <div class="progress-section" id="progressSection">
      <div class="prog-header">
        <span id="progStatus">Mengunduh...</span>
        <span id="progPct">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-eta">
        <span id="progSpeed"></span>
        &nbsp;·&nbsp;
        ETA <span id="progEta">—</span>
      </div>
    </div>
  </div>

  <!-- File yang sudah diunduh -->
  <div class="files-section" id="filesSection" style="display:none">
    <div class="files-header">
      <span class="files-title">✦ File Diunduh</span>
      <button class="refresh-btn" onclick="loadFiles()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Refresh
      </button>
    </div>
    <div class="file-list" id="fileList"></div>
  </div>

  <p class="note">Hanya untuk keperluan pribadi &amp; konten yang kamu miliki haknya.<br>Pastikan server backend berjalan di localhost:3001 ✦</p>
</div>

<div class="toast" id="toast"></div>

<script src="/script.js"></script>
</body>
</html>
